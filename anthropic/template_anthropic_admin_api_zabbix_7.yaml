        - uuid: 1f526ec9793b4f6e8656e8191f858da4
          name: 'Anthropic: Cost latest hour spend'
          type: DEPENDENT
          key: anthropic.cost.hour.usd
          delay: '0'
          history: 30d
          value_type: FLOAT
          master_item:
            key: anthropic.cost.hour.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.amount_usd
          units: USD
          tags:
            - tag: component
              value: anthropic
            - tag: metric
              value: cost

        - uuid: 3cfe73eeb93a45b4becdb69eb08ff731
          name: 'Anthropic: Cost current UTC day'
          type: DEPENDENT
          key: anthropic.cost.day.usd
          delay: '0'
          history: 90d
          value_type: FLOAT
          master_item:
            key: anthropic.cost.day.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.amount_usd
          units: USD
          tags:
