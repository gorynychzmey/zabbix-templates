        - uuid: 9f678634cb9940b8aa91574673abcb8f
          name: 'Anthropic: Usage bucket start'
          type: DEPENDENT
          key: anthropic.usage.bucket.start
          delay: '0'
          history: 30d
          value_type: CHAR
          trends: '0'
          master_item:
            key: anthropic.usage.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.starting_at
          tags:
            - tag: component
              value: anthropic

        - uuid: 64b0904e637f45e4bf5246647af90d0c
          name: 'Anthropic: Usage uncached input tokens'
          type: DEPENDENT
          key: anthropic.tokens.input.uncached
          delay: '0'
          history: 30d
          value_type: UNSIGNED
          master_item:
            key: anthropic.usage.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uncached_input_tokens
          units: tokens
          tags:
            - tag: component
              value: anthropic
            - tag: metric
              value: tokens

        - uuid: 7e8c4065f6f94af8bc5e663ab30bcdf3
          name: 'Anthropic: Usage cache creation input tokens'
          type: DEPENDENT
          key: anthropic.tokens.input.cache_create
          delay: '0'
          history: 30d
          value_type: UNSIGNED
          master_item:
            key: anthropic.usage.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.cache_creation_input_tokens
          units: tokens
          tags:
            - tag: component
              value: anthropic
            - tag: metric
              value: tokens

        - uuid: c80cb22bb391488889c9d4454902f73b
          name: 'Anthropic: Usage cache read input tokens'
          type: DEPENDENT
          key: anthropic.tokens.input.cache_read
          delay: '0'
          history: 30d
          value_type: UNSIGNED
          master_item:
            key: anthropic.usage.raw
          preprocessing:
