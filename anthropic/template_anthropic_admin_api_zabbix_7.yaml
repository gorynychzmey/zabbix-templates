          delay: '0'
          history: 30d
          value_type: UNSIGNED
          master_item:
            key: anthropic.usage.raw
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.output_tokens
          units: tokens
          tags:
            - tag: component
              value: anthropic
            - tag: metric
              value: tokens

        - uuid: 9a2b52a166c3446cb16d265ecf85b1bb
          name: 'Anthropic: Usage total tokens'
          type: DEPENDENT
          key: anthropic.tokens.total
          delay: '0'
          history: 30d
          value_type: UNSIGNED
          master_item:
            key: anthropic.usage.raw
          preprocessing:
