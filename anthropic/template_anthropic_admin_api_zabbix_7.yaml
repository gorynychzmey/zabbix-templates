      triggers:
        - uuid: d29c0538b7d2461090e20d5d822fbfff
          expression: 'nodata(/Anthropic Admin API by script/anthropic.usage.raw,20m)=1'
          name: 'Anthropic usage API data missing for 20m'
          priority: AVERAGE
          description: 'No fresh usage data has been collected for 20 minutes. Check Admin API key, permissions, proxy access, or Anthropic delays.'

        - uuid: 2d4ab9cc43814ce7a0931dc530356668
          expression: 'nodata(/Anthropic Admin API by script/anthropic.cost.day.raw,30m)=1'
          name: 'Anthropic cost API data missing for 30m'
          priority: AVERAGE
          description: 'No fresh day spend data has been collected for 30 minutes.'

        - uuid: db73154c8f7b4696bdc69897a53ec471
          expression: 'last(/Anthropic Admin API by script/anthropic.cost.day.usd)>{$ANTHROPIC.SPEND.DAY.WARN}'
          name: 'Anthropic current UTC day spend is above {$ANTHROPIC.SPEND.DAY.WARN} USD'
          priority: WARNING
          description: 'Current UTC day cumulative spend exceeded the warning threshold.'

        - uuid: c9d4bda3aaeb4e3e81e24f5cbcb1f8fc
          expression: 'last(/Anthropic Admin API by script/anthropic.cost.day.usd)>{$ANTHROPIC.SPEND.DAY.HIGH}'
          name: 'Anthropic current UTC day spend is above {$ANTHROPIC.SPEND.DAY.HIGH} USD'
          priority: HIGH
          description: 'Current UTC day cumulative spend exceeded the high threshold.'

        - uuid: e0ec54a02f754084b729f04ef6a3f76b
          expression: 'last(/Anthropic Admin API by script/anthropic.cost.month.usd)>{$ANTHROPIC.SPEND.MONTH.WARN}'
          name: 'Anthropic current UTC month spend is above {$ANTHROPIC.SPEND.MONTH.WARN} USD'
          priority: WARNING
          description: 'Current UTC month cumulative spend exceeded the warning threshold.'

        - uuid: 2c9fa59b2db949a08480e61d7f6ad6a6
          expression: 'last(/Anthropic Admin API by script/anthropic.cost.month.usd)>{$ANTHROPIC.SPEND.MONTH.HIGH}'
