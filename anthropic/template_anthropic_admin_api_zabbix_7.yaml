          name: 'Anthropic latest minute output tokens are above {$ANTHROPIC.OUTPUT.TOKENS.MAX}'
          priority: WARNING
          description: 'Latest non-empty minute bucket has unusually high output token volume.'

        - uuid: 7bb8831d9b714a75bfffe5410168441e
          expression: 'last(/Anthropic Admin API by script/anthropic.tokens.input.total)>{$ANTHROPIC.INPUT.TOKENS.MAX}'
          name: 'Anthropic latest minute total input tokens are above {$ANTHROPIC.INPUT.TOKENS.MAX}'
          priority: WARNING
          description: 'Latest non-empty minute bucket has unusually high total input token volume.'
